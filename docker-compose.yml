services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: otpilot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5442:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d otpilot"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./api
    profiles: [api]
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    env_file: ./api/.env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/otpilot

volumes:
  postgres_data:
