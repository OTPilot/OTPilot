<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>OTPilot</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 300px;
      min-height: 365px;
      display: flex;
      flex-direction: column;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #cbd5e1;
      user-select: none;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 16px;
      background: #1e293b;
      border-bottom: 1px solid #1e3a5f;
    }
    .header h1 { font-size: 15px; font-weight: 700; color: #f1f5f9; }

    /* ── Account bar ── */
    #account-bar {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 7px 10px;
    }

    .acc-av {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
      width: 18px; height: 18px; font-size: 8px;
    }
    .acc-av.acc-av-md { width: 22px; height: 22px; font-size: 9px; }

    .acc-chip {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 3px 8px 3px 4px;
      flex: 0 1 auto;
      min-width: 0;
      max-width: 84px;
      background: transparent;
      border: 1px solid #1e3a5f;
      border-radius: 20px;
      color: #64748b;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: border-color .15s, color .15s, background .15s;
    }
    .acc-chip:hover { color: #94a3b8; border-color: #334155; }
    .acc-chip.active { border-color: #38bdf8; background: rgba(56,189,248,0.08); color: #38bdf8; }
    .acc-chip-name { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .acc-overflow-btn {
      flex-shrink: 0;
      margin-left: auto;
      padding: 4px 8px;
      background: transparent;
      border: 1px solid #1e3a5f;
      border-radius: 20px;
      color: #475569;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: border-color .15s, color .15s;
      position: relative;
    }
    .acc-overflow-btn:hover { border-color: #334155; color: #94a3b8; }
    .acc-overflow-btn.active { border-color: #38bdf8; color: #38bdf8; }
    .acc-overflow-btn.has-active::after {
      content: '';
      position: absolute;
      top: -3px; right: -3px;
      width: 7px; height: 7px;
      background: #38bdf8;
      border-radius: 50%;
      border: 1.5px solid #0f172a;
    }

    .acc-overflow-panel {
      border-bottom: 1px solid #1e3a5f;
      background: #1e293b;
    }
    .acc-overflow-search {
      padding: 7px 10px;
      border-bottom: 1px solid #1e3a5f;
    }
    .acc-overflow-search input {
      width: 100%;
      background: #0f172a;
      border: 1px solid #1e3a5f;
      border-radius: 4px;
      padding: 5px 8px;
      color: #e2e8f0;
      font-size: 11px;
      font-family: inherit;
      outline: none;
    }
    .acc-overflow-search input:focus { border-color: #38bdf8; }
    .acc-overflow-search input::placeholder { color: #475569; }

    .acc-overflow-list {
      max-height: 150px;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: #1e3a5f transparent;
    }
    .acc-overflow-list::-webkit-scrollbar { width: 3px; }
    .acc-overflow-list::-webkit-scrollbar-thumb { background: #1e3a5f; border-radius: 2px; }

    .acc-overflow-item {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 6px 10px;
      width: 100%;
      background: transparent;
      border: none;
      cursor: pointer;
      font-family: inherit;
      text-align: left;
      transition: background .1s;
    }
    .acc-overflow-item:hover { background: rgba(56,189,248,0.06); }
    .acc-overflow-item.active { background: rgba(56,189,248,0.1); }
    .acc-overflow-text { flex: 1; min-width: 0; }
    .acc-overflow-name {
      display: block;
      font-size: 11px; font-weight: 600; color: #e2e8f0;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .acc-overflow-email {
      display: block;
      font-size: 10px; color: #475569;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .acc-overflow-check { color: #38bdf8; font-size: 10px; flex-shrink: 0; }

    /* ── OTP display ── */
    .code-section {
      padding: 14px 16px 10px;
      text-align: center;
    }
    .code-header {
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      min-height: 16px;
      margin-bottom: 4px;
    }
    #account-name {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .8px;
      color: #475569;
    }
    #btn-obfuscate {
      position: absolute;
      right: 0;
      background: none;
      border: none;
      cursor: pointer;
      color: #334155;
      padding: 0;
      line-height: 0;
      transition: color .15s;
      display: flex;
      align-items: center;
    }
    #btn-obfuscate.revealed { color: #38bdf8; }
    #btn-obfuscate:hover { color: #94a3b8; }
    #otp-display {
      font-family: 'Courier New', Courier, monospace;
      font-size: 38px;
      font-weight: 700;
      letter-spacing: 6px;
      color: #38bdf8;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #otp-display.dim   { color: #334155; font-size: 22px; letter-spacing: 2px; }
    #otp-display.error { color: #f87171; font-size: 13px; letter-spacing: 0; }

    .countdown { font-size: 11px; color: #475569; margin-top: 6px; }

    .progress-wrap {
      margin-top: 7px; height: 3px;
      background: #1e293b; border-radius: 2px; overflow: hidden;
    }
    #progress-bar {
      height: 100%; background: #38bdf8;
      transition: width 1s linear, background .3s;
    }

    /* ── Action buttons ── */
    .actions { display: flex; gap: 8px; padding: 10px 16px; }
    .btn {
      flex: 1; padding: 8px; border: none; border-radius: 6px;
      font-size: 13px; font-weight: 600; cursor: pointer; transition: opacity .15s;
    }
    .btn:disabled { opacity: .35; cursor: default; }
    .btn:not(:disabled):hover { opacity: .85; }
    #btn-copy { background: #1e293b; color: #94a3b8; }
    #btn-fill { background: #0ea5e9; color: #fff; }

    /* ── Status ── */
    #status-msg {
      min-height: 18px; text-align: center;
      font-size: 12px; padding: 0 16px 6px;
    }
    #status-msg.ok  { color: #4ade80; }
    #status-msg.err { color: #f87171; }

    /* ── Header buttons ── */
    .header-btn {
      background: none; border: none; cursor: pointer;
      color: #334155; padding: 0; line-height: 0;
      display: flex; align-items: center; transition: color .15s;
    }
    .header-btn:hover { color: #94a3b8; }

    /* ── Bottom nav ── */
    .bottom-nav {
      display: flex;
      background: #1e293b;
      border-top: 1px solid #1e3a5f;
    }
    .nav-btn {
      flex: 1; padding: 10px 0;
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      background: none; border: none; cursor: pointer;
      color: #475569; font-size: 10px; font-weight: 600;
      transition: color .15s;
    }
    .nav-btn:hover { color: #94a3b8; }
    .nav-btn.active { color: #38bdf8; }

    #home-view, #settings-panel, #config-panel { flex: 1; }
    .settings-body { padding: 6px 14px 14px; }

    /* ── Account search + toolbar ── */
    .acc-search {
      padding: 7px 10px;
      border-bottom: 1px solid #1e3a5f;
      background: #1e293b;
    }
    .acc-search-wrap { position: relative; }
    .acc-search-icon {
      position: absolute; left: 8px; top: 50%;
      transform: translateY(-50%);
      color: #334155; pointer-events: none; display: flex;
    }
    .acc-search input {
      width: 100%; background: #0f172a; border: 1px solid #1e3a5f;
      border-radius: 4px; padding: 5px 8px 5px 28px;
      color: #e2e8f0; font-size: 11px; font-family: inherit; outline: none;
      transition: border-color .15s;
    }
    .acc-search input:focus { border-color: #38bdf8; }
    .acc-search input::placeholder { color: #475569; }

    .acc-toolbar {
      display: flex; align-items: center;
      padding: 4px 10px; border-bottom: 1px solid #1e3a5f;
    }
    .acc-count { font-size: 10px; color: #334155; }

    /* ── Account accordion ── */
    #accounts-list {
      max-height: 280px;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: #1e3a5f transparent;
    }
    #accounts-list::-webkit-scrollbar { width: 3px; }
    #accounts-list::-webkit-scrollbar-thumb { background: #1e3a5f; border-radius: 2px; }

    .acc-row { border-bottom: 1px solid #1e3a5f; }
    .acc-row:last-child { border-bottom: none; }

    .acc-head {
      display: flex; align-items: center; gap: 8px;
      padding: 7px 10px; width: 100%;
      background: transparent; border: none; border-left: 2px solid transparent;
      cursor: pointer; font-family: inherit; text-align: left;
      transition: background .1s, border-color .15s;
    }
    .acc-head:hover { background: rgba(56,189,248,0.04); }
    .acc-head.open {
      background: rgba(56,189,248,0.08); border-left-color: #38bdf8;
    }
    .acc-head-text { flex: 1; min-width: 0; }
    .acc-head-name {
      display: block; font-size: 11px; font-weight: 600; color: #e2e8f0;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .acc-head-email {
      display: block; font-size: 10px; color: #475569;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .acc-chevron {
      color: #334155; transition: transform .2s, color .15s;
      flex-shrink: 0; display: flex; align-items: center;
    }
    .acc-head.open .acc-chevron { transform: rotate(180deg); color: #38bdf8; }

    .acc-body {
      display: none; padding: 8px 12px 10px;
      background: #0c1525; border-top: 1px solid #1e3a5f;
      border-left: 2px solid #38bdf8;
    }
    .acc-body.open { display: block; }
    .acc-body-head {
      display: flex; align-items: center;
      justify-content: flex-end; margin-bottom: 8px;
    }

    .settings-footer { padding: 8px 14px 10px; border-top: 1px solid #1e3a5f; }
    .settings-footer-actions { display: flex; gap: 6px; margin-top: 6px; }
    .btn-cancel {
      flex: 1; padding: 8px;
      background: transparent; border: 1px solid #334155;
      border-radius: 6px; color: #475569;
      font-size: 13px; font-weight: 600; cursor: pointer;
      font-family: inherit; transition: all .15s;
    }
    .btn-cancel:hover { border-color: #475569; color: #94a3b8; }

    .btn-del {
      background: none; border: 1px solid #334155; border-radius: 4px;
      color: #475569; font-size: 11px; cursor: pointer; padding: 2px 7px; line-height: 1.5;
      font-family: inherit; transition: all .15s;
    }
    .btn-del:hover { color: #f87171; border-color: #f87171; background: rgba(248,113,113,0.08); }

    .acc-field { margin-bottom: 7px; }
    .acc-field label {
      display: block; font-size: 10px; font-weight: 600;
      text-transform: uppercase; letter-spacing: .5px;
      color: #475569; margin-bottom: 3px;
    }
    .field-row { display: flex; gap: 5px; }
    .acc-field input, .acc-field textarea {
      width: 100%; padding: 6px 9px;
      background: #0f172a; border: 1px solid #1e3a5f;
      border-radius: 5px; color: #e2e8f0;
      font-size: 12px; font-family: monospace;
    }
    .acc-field textarea { resize: vertical; min-height: 52px; line-height: 1.5; }
    .acc-field input:focus,
    .acc-field textarea:focus { outline: none; border-color: #38bdf8; }
    .acc-field .field-row input { flex: 1; }

    .btn-eye {
      padding: 0 8px; background: #0f172a;
      border: 1px solid #1e3a5f; border-radius: 5px;
      color: #475569; cursor: pointer; font-size: 13px;
    }
    .btn-eye:hover { color: #94a3b8; }

    .btn-add {
      width: 100%; padding: 7px; margin-bottom: 8px;
      background: transparent; border: 1px dashed #1e3a5f;
      border-radius: 6px; color: #475569;
      font-size: 12px; cursor: pointer; transition: all .15s;
    }
    .btn-add:hover { border-color: #38bdf8; color: #38bdf8; }

    .btn-save-all {
      flex: 1; padding: 8px;
      background: #1e3a5f; border: 1px solid #38bdf8;
      border-radius: 6px; color: #38bdf8;
      font-size: 13px; font-weight: 600; cursor: pointer; transition: all .15s;
    }
    .btn-save-all:hover { background: #0ea5e9; color: #fff; border-color: #0ea5e9; }

    /* ── Export / Import ── */
    .backup-row {
      display: flex; gap: 8px; margin-top: 10px;
    }
    /* ── Toggle switch (autofill) ── */
    .toggle {
      display: flex; align-items: center; gap: 8px;
      cursor: pointer; user-select: none; margin-top: 4px;
    }
    .toggle input { display: none; }
    .toggle-track {
      width: 28px; height: 16px; flex-shrink: 0;
      background: #1e3a5f; border-radius: 8px;
      position: relative; transition: background .2s;
    }
    .toggle-track::after {
      content: ''; position: absolute;
      width: 12px; height: 12px; border-radius: 50%;
      background: #475569; top: 2px; left: 2px; transition: all .2s;
    }
    .toggle input:checked + .toggle-track { background: #0ea5e9; }
    .toggle input:checked + .toggle-track::after { left: 14px; background: #fff; }
    .toggle-label { font-size: 11px; color: #64748b; }

    .btn-backup {
      flex: 1; padding: 7px;
      background: transparent; border: 1px solid #1e3a5f;
      border-radius: 6px; color: #64748b;
      font-size: 12px; font-weight: 600; cursor: pointer; transition: all .15s;
    }
    .btn-backup:hover { border-color: #38bdf8; color: #38bdf8; }

    #crypto-form {
      margin-top: 8px; padding: 10px;
      background: #0f172a; border: 1px solid #1e3a5f; border-radius: 6px;
    }
    #crypto-form label {
      display: block; font-size: 10px; font-weight: 600;
      text-transform: uppercase; letter-spacing: .5px;
      color: #475569; margin-bottom: 5px;
    }
    #crypto-form .field-row { display: flex; gap: 6px; }
    #crypto-password {
      flex: 1; padding: 6px 9px;
      background: #1e293b; border: 1px solid #1e3a5f;
      border-radius: 5px; color: #e2e8f0;
      font-size: 12px; font-family: monospace;
    }
    #crypto-password:focus { outline: none; border-color: #38bdf8; }
    .btn-crypto-ok {
      padding: 6px 12px;
      background: #0ea5e9; border: none; border-radius: 5px;
      color: #fff; font-size: 12px; font-weight: 600; cursor: pointer;
    }
    .btn-crypto-ok:hover { background: #38bdf8; }
    .btn-crypto-cancel {
      padding: 6px 10px;
      background: transparent; border: 1px solid #334155;
      border-radius: 5px; color: #475569; font-size: 12px; cursor: pointer;
    }
    .btn-crypto-cancel:hover { color: #94a3b8; border-color: #475569; }

    /* ── Export picker ── */
    #export-picker, #import-picker {
      margin-top: 8px; padding: 8px;
      background: #0f172a; border: 1px solid #1e3a5f; border-radius: 6px;
    }
    #export-picker-list, #import-picker-list { max-height: 140px; overflow-y: auto; overflow-x: hidden; margin-bottom: 6px; }
    .export-acc-row {
      display: flex; align-items: center; gap: 7px;
      padding: 4px 2px; cursor: pointer; border-radius: 4px;
      overflow: hidden;
    }
    .export-acc-row:hover { background: #1e293b; }
    .export-acc-row input { accent-color: #0ea5e9; flex-shrink: 0; }
    .export-acc-name { font-size: 11px; font-weight: 600; color: #94a3b8; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .export-acc-email { font-size: 10px; color: #475569; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 90px; }
    .export-select-all {
      display: flex; align-items: center; gap: 7px;
      padding: 6px 2px 3px; cursor: pointer;
      font-size: 10px; color: #475569;
      border-top: 1px solid #1e3a5f; margin-top: 2px;
    }
    .export-select-all input { accent-color: #0ea5e9; }
    .export-acc-exists {
      font-size: 9px; color: #475569; background: #1e293b;
      border: 1px solid #334155; border-radius: 3px; padding: 1px 5px;
      white-space: nowrap; flex-shrink: 0;
    }
    .export-acc-row.disabled { opacity: .45; cursor: default; }
    .export-acc-row.disabled input { cursor: default; }

    /* ── Lock overlay ── */
    #lock-overlay {
      position: fixed; inset: 0; z-index: 999;
      background: #0f172a;
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
    }
    #lock-overlay.hidden { display: none; }

    #lock-setup, #lock-login {
      width: 100%;
      background: #1e293b;
      border: none;
      border-radius: 12px;
      padding: 28px 24px 24px;
      display: flex; flex-direction: column; gap: 14px;
    }

    .lock-head {
      display: flex; flex-direction: column; align-items: center;
      gap: 10px; text-align: center; margin-bottom: 4px;
    }
    .lock-icon  { font-size: 36px; line-height: 1; }
    .lock-title { font-size: 15px; font-weight: 700; color: #f1f5f9; }
    .lock-sub   { font-size: 11px; color: #475569; line-height: 1.6; }

    .lock-input {
      width: 100%; padding: 9px 12px;
      background: #0f172a; border: none;
      border-radius: 6px; color: #e2e8f0;
      font-size: 13px; font-family: monospace;
    }
    .lock-input:focus { outline: none; border-color: #475569; }
    .lock-input.err   { border-color: #f87171; }

    .lock-btn {
      width: 100%; padding: 10px;
      background: #0ea5e9; border: none; border-radius: 6px;
      color: #fff; font-size: 13px; font-weight: 600;
      cursor: pointer; transition: opacity .15s; margin-top: 2px;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .lock-btn:disabled { opacity: .45; cursor: default; }
    .lock-btn:not(:disabled):hover { opacity: .85; }

    .lock-err {
      font-size: 12px; color: #f87171;
      text-align: center; min-height: 15px; margin-top: -4px;
    }

    .lock-remember {
      display: flex; align-items: center; gap: 8px;
      font-size: 11px; color: #64748b; cursor: pointer;
    }
    .lock-remember input { accent-color: #0ea5e9; flex-shrink: 0; }

    .spinner {
      width: 14px; height: 14px; border-radius: 50%;
      border: 2px solid rgba(255,255,255,.3);
      border-top-color: #fff;
      animation: spin .7s linear infinite; flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Ko-fi footer ── */
    .kofi-footer {
      border-top: 1px solid #1e293b;
      padding: 8px 16px;
      text-align: center;
    }
    .kofi-footer a {
      font-size: 11px;
      color: #475569;
      text-decoration: none;
      transition: color .15s;
    }
    .kofi-footer a:hover { color: #38bdf8; }
  </style>
</head>
<body>

<!-- ── Lock overlay ── -->
<div id="lock-overlay" class="hidden">

  <!-- Screen A: first-time setup -->
  <div id="lock-setup">
    <div class="lock-head">
      <div class="lock-icon">🔐</div>
      <div class="lock-title">Create a master password</div>
      <div class="lock-sub">You'll be asked for this each time your session expires.</div>
    </div>
    <input type="password" id="lock-new-password"     class="lock-input" placeholder="New password"     autocomplete="new-password">
    <input type="password" id="lock-confirm-password" class="lock-input" placeholder="Confirm password" autocomplete="new-password">
    <label class="lock-remember">
      <input type="checkbox" id="lock-setup-30d">
      Keep me logged in for 30 days (default: 24 h)
    </label>
    <div class="lock-err" id="lock-setup-err"></div>
    <button class="lock-btn" id="lock-setup-btn">Set password</button>
  </div>

  <!-- Screen B: login (session expired) -->
  <div id="lock-login" style="display:none">
    <div class="lock-head">
      <div class="lock-icon">🔒</div>
      <div class="lock-title">OTPilot is locked</div>
      <div class="lock-sub">Enter your master password to continue.</div>
    </div>
    <input type="password" id="lock-password" class="lock-input" placeholder="Master password" autocomplete="current-password">
    <label class="lock-remember">
      <input type="checkbox" id="lock-login-30d">
      Keep me logged in for 30 days (default: 24 h)
    </label>
    <div class="lock-err" id="lock-login-err"></div>
    <button class="lock-btn" id="lock-login-btn">Unlock</button>
  </div>

</div>

<div class="header">
  <svg width="20" height="20" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
    <path d="M64 18 L98 33 V66 Q98 92 64 110 Q30 92 30 66 V33 Z" fill="#1e3a5f"/>
    <path d="M64 18 L98 33 V66 Q98 92 64 110 Q30 92 30 66 V33 Z" fill="none" stroke="#38bdf8" stroke-width="4.5" stroke-linejoin="round"/>
    <circle cx="64" cy="68" r="20" fill="#0f172a" stroke="#38bdf8" stroke-width="4"/>
    <line x1="64" y1="68" x2="57" y2="54" stroke="#38bdf8" stroke-width="4" stroke-linecap="round"/>
    <line x1="64" y1="68" x2="78" y2="72" stroke="#38bdf8" stroke-width="3" stroke-linecap="round"/>
    <circle cx="64" cy="68" r="3" fill="#38bdf8"/>
  </svg>
  <h1>OTPilot</h1>
  <div style="margin-left:auto; display:flex; align-items:center; gap:10px">
    <button id="btn-quick-add" class="header-btn" title="Add account">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
    </button>
    <button id="btn-logout" class="header-btn" title="Lock OTPilot">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2v6"/>
        <path d="M6.8 6.8a8 8 0 1 0 10.4 0"/>
      </svg>
    </button>
  </div>
</div>

<!-- Home view -->
<div id="home-view">
  <div id="account-bar"></div>
  <div id="account-overflow-panel" class="acc-overflow-panel" style="display:none">
    <div class="acc-overflow-search">
      <input type="text" id="account-search" placeholder="Search accounts…" autocomplete="off">
    </div>
    <div id="account-overflow-list" class="acc-overflow-list"></div>
  </div>

  <div class="code-section">
    <div class="code-header">
      <div id="account-name"></div>
      <button id="btn-obfuscate" title="Show code"></button>
    </div>
    <div id="otp-display" class="dim">••• •••</div>
    <div class="countdown" id="countdown">–</div>
    <div class="progress-wrap">
      <div id="progress-bar" style="width:100%"></div>
    </div>
  </div>

  <div class="actions">
    <button class="btn" id="btn-copy" disabled>Copy</button>
    <button class="btn" id="btn-fill" disabled>Fill Page</button>
  </div>

  <div id="status-msg"></div>
</div>

<!-- Accounts view -->
<div id="settings-panel" style="display:none">
  <div class="acc-search">
    <div class="acc-search-wrap">
      <span class="acc-search-icon">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </span>
      <input id="acc-search" type="text" placeholder="Search accounts…" autocomplete="off">
    </div>
  </div>
  <div class="acc-toolbar">
    <span class="acc-count" id="acc-count"></span>
  </div>
  <div id="accounts-list"></div>
  <div class="settings-footer">
    <button class="btn-add" id="btn-add">+ Add account</button>
    <div class="settings-footer-actions">
      <button class="btn-cancel" id="btn-cancel">Cancel</button>
      <button class="btn-save-all" id="btn-save-all">Save</button>
    </div>
  </div>
</div>

<!-- Settings view -->
<div id="config-panel" style="display:none">
  <div class="settings-body">
    <div class="backup-row">
      <button class="btn-backup" id="btn-export">↑ Export</button>
      <button class="btn-backup" id="btn-import">↓ Import</button>
    </div>

    <div id="export-picker" style="display:none">
      <div id="export-picker-list"></div>
      <label class="export-select-all">
        <input type="checkbox" id="export-select-all" checked>
        <span>Select all</span>
      </label>
      <div class="field-row" style="margin-top:8px">
        <button class="btn-crypto-ok" id="export-picker-confirm">Export selected</button>
        <button class="btn-crypto-cancel" id="export-picker-cancel">✕</button>
      </div>
    </div>

    <div id="import-picker" style="display:none">
      <div id="import-picker-list"></div>
      <label class="export-select-all">
        <input type="checkbox" id="import-select-all" checked>
        <span>Select all</span>
      </label>
      <div class="field-row" style="margin-top:8px">
        <button class="btn-crypto-ok" id="import-picker-confirm">Import selected</button>
        <button class="btn-crypto-cancel" id="import-picker-cancel">✕</button>
      </div>
    </div>

    <div id="crypto-form" style="display:none">
      <label id="crypto-label">Password</label>
      <div class="field-row">
        <input type="password" id="crypto-password" placeholder="Password for this backup" autocomplete="off">
        <button class="btn-crypto-ok" id="crypto-confirm">OK</button>
        <button class="btn-crypto-cancel" id="crypto-cancel">✕</button>
      </div>
    </div>

    <input type="file" id="import-file" accept=".json" style="display:none">
  </div>
</div>
